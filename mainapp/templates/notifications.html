<!DOCTYPE html>
<html>
<head>
    <title>Alumni Placement System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<footer style="text-align:center;margin-top:30px;">
© 2026 Alumni Placement System
</footer>

<body>
<div class="container mt-4">

<a href="/" class="btn btn-warning me-2">Home</a>

<a href="/alumni/" class="btn btn-primary me-2">View Alumni</a>
<a href="/notifications/" class="btn btn-success me-2">Notifications</a>

<hr>

<h2>Placement Notifications</h2>

{% for n in notifications %}
<div style="border:1px solid #ccc; padding:15px; margin:10px; border-radius:8px;">
    <h4>{{ n.message }}</h4>
    <p><b>Company:</b> {{ n.company }}</p>
    <p><b>Year:</b> {{ n.year }}</p>
    <p>{{ n.description }}</p>
</div>
{% empty %}
<p>No notifications available</p>
{% endfor %}


<hr>
<p style="text-align:center;">© 2026 Alumni Placement System</p>
</div>
</body>
</html>
